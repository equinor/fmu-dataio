name: Test

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  pull-requests: write

jobs:
  run_tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install Ert Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libegl1

      - name: Install fmu-dataio
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            uv sync --all-extras --upgrade
          else
            uv sync --all-extras --frozen
          fi

      - name: Install fmu-datamodels
        run: |
          uv pip install \
            "fmu-datamodels @ git+https://github.com/equinor/fmu-datamodels.git"

      # fmu-sumo-uploader blocked by OpenVDS on Python 3.14
      - name: Install fmu-sumo-uploader
        if: matrix.python-version != '3.14'
        run: uv pip install \ "fmu-sumo-uploader @
          git+https://github.com/equinor/fmu-sumo-uploader.git"

      - name: Full test
        run: |
          uv run pytest -n auto -v --cov --cov-report term-missing
